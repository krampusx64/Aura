agent:
    context_window: 131000
    core_memory_cap_mode: soft
    core_memory_max_entries: 200
    core_personality: friend
    debug_mode: false
    enable_google_workspace: true
    max_tool_calls: 12
    memory_compression_char_limit: 50000
    personality_engine: true
    personality_engine_v2: true
    personality_v2_model: gpt-4o-mini
    personality_v2_url: ""
    personality_v2_api_key: ""
    show_tool_results: false
    step_delay_seconds: 0
    system_language: Deutsch
    system_prompt_token_budget: 8000
    workflow_feedback: true
budget:
    daily_limit_usd: 1
    default_cost:
        input_per_million: 1
        output_per_million: 3
    enabled: false
    enforcement: warn
    models:
        - input_per_million: 0
          name: arcee-ai/trinity-large-preview:free
          output_per_million: 0
        - input_per_million: 0.075
          name: google/gemini-2.5-flash-lite-preview-09-2025
          output_per_million: 0.3
    reset_hour: 0
    warning_threshold: 0.8
chromecast:
    enabled: true
    tts_port: 8090
circuit_breaker:
    llm_timeout_seconds: 180
    maintenance_timeout_minutes: 10
    max_tool_calls: 20
    retry_intervals:
        - 10s
        - 2m
        - 10m
co_agents:
    circuit_breaker:
        max_tokens: 0
        max_tool_calls: 12
        timeout_seconds: 300
    enabled: true
    llm:
        api_key: ""
        base_url: ""
        model: stepfun/step-3.5-flash
        provider: openrouter
    max_concurrent: 3
directories:
    data_dir: ./data
    prompts_dir: ./agent_workspace/prompts
    skills_dir: ./agent_workspace/skills
    tools_dir: ./agent_workspace/tools
    vectordb_dir: ./data/vectordb
    workspace_dir: ./agent_workspace/workdir
discord:
    allowed_user_id: ""
    bot_token: ""
    default_channel_id: ""
    enabled: false
    guild_id: ""
docker:
    enabled: false
    host: ""
email:
    enabled: false
    from_address: ""
    imap_host: ""
    imap_port: 993
    password: ""
    smtp_host: ""
    smtp_port: 587
    username: ""
    watch_enabled: false
    watch_folder: INBOX
    watch_interval_seconds: 120
embeddings:
    api_key: dummy_key
    external_model: nomic-embed-text
    external_url: http://localhost:11434/v1
    internal_model: qwen/qwen3-embedding-8b
    provider: internal
fallback_llm:
    api_key: ""
    base_url: https://openrouter.ai/api/v1
    enabled: false
    error_threshold: 2
    model: meta-llama/llama-3.1-8b-instruct:free
    probe_interval_seconds: 60
home_assistant:
    access_token: ""
    enabled: false
    url: http://localhost:8123
koofr:
    app_password: ""
    base_url: https://app.koofr.net
    enabled: false
    username: ""
llm:
    api_key: ""
    base_url: https://openrouter.ai/api/v1
    model: arcee-ai/trinity-large-preview:free
    provider: openrouter
    use_native_functions: true
logging:
    enable_file_log: true
    log_dir: ./log
maintenance:
    enabled: true
    lifeboat_enabled: true
    lifeboat_port: 8091
    time: "04:00"
server:
    host: 127.0.0.1
    port: 8088
    bridge_address: "localhost:8089"
    max_body_bytes: 10485760
sqlite:
    inventory_path: ./data/inventory.db
    long_term_path: ./data/long_term.db
    short_term_path: ./data/short_term.db
telegram:
    bot_token: ""
    telegram_user_id: 0
    max_concurrent_workers: 5
tts:
    elevenlabs:
        api_key: ""
        model_id: eleven_multilingual_v2
        voice_id: ""
    language: de
    provider: google
vision:
    api_key: ""
    base_url: https://openrouter.ai/api/v1
    model: google/gemini-2.5-flash-lite-preview-09-2025
    provider: openrouter
web_config:
    enabled: true
webdav:
    enabled: false
    password: ""
    url: ""
    username: ""
whisper:
    api_key: ""
    base_url: https://openrouter.ai/api/v1
    model: google/gemini-2.5-flash-lite-preview-09-2025
    provider: openrouter
